<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-toolbar">
          <input type="text" id="search-input" placeholder="Search activities..." />
          <select id="category-filter">
            <option value="">All Categories</option>
            <option value="Academic">Academic</option>
            <option value="Sports">Sports</option>
            <option value="Arts">Arts</option>
          </select>
          <select id="sort-select">
            <option value="name-asc">Name (A–Z)</option>
            <option value="name-desc">Name (Z–A)</option>
            <option value="spots-desc">Most Spots Available</option>
            <option value="spots-asc">Fewest Spots Available</option>
          </select>
        </div>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>

      <section id="stats-container">
        <h3>Participation Statistics</h3>
        <div id="stats-summary">
          <div class="stat-card">
            <span class="stat-value" id="stat-total-activities">–</span>
            <span class="stat-label">Activities</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-total-participants">–</span>
            <span class="stat-label">Total Participants</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-total-capacity">–</span>
            <span class="stat-label">Total Capacity</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-fill-rate">–</span>
            <span class="stat-label">Fill Rate</span>
          </div>
        </div>
        <div id="chart-container">
          <canvas id="stats-chart"></canvas>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
  </body>
</html>
